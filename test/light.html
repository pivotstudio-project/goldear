<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라이트 테스트 — 황금귀 챌린지</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../css/style.css" />

  <style>
    .freq-bar-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      height: 80px;
    }
    .freq-bar {
      width: 18px;
      border-radius: 4px 4px 0 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      transition: all 0.3s var(--ease);
    }
    .freq-bar.active {
      background: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow-strong);
    }
    .freq-bar.passed {
      background: var(--gold-dim);
      border-color: var(--gold-dim);
      opacity: 0.5;
    }
    .freq-bar.failed {
      background: var(--bg-elevated);
      opacity: 0.2;
    }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: var(--bg-elevated);
      outline: none;
      cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      box-shadow: 0 0 8px var(--gold-glow-strong);
      transition: transform 0.2s;
    }
    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .volume-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: none;
    }

    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; }

    .btn-stop {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 2px solid var(--border-hover);
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-base);
    }
    .btn-stop:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
      background: rgba(255,107,107,0.08);
      transform: scale(1.03);
    }
    .btn-stop:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

<header class="header scrolled">
  <a href="../index.html" class="logo">🦻 황금귀</a>
  <div class="step-indicator">
    <div class="step-dot active" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
  </div>
</header>

<main style="min-height:100dvh; padding-top:72px; display:flex; align-items:center;">
  <div class="container" style="padding-top:32px; padding-bottom:80px; width:100%;">

    <!-- ================================
         SCREEN 0: 볼륨 설정
         ================================ -->
    <div class="screen active animate-fade-up" id="screen0">

      <div style="text-align:center; margin-bottom:40px;">
        <p class="caption" style="letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px;">Step 1 of 2</p>
        <h1 class="heading-1" style="margin-bottom:12px;">볼륨을 맞춰주세요</h1>
        <p class="body" style="color:var(--text-muted);">
          소리를 들으면서 <strong style="color:var(--text);">편안하게 잘 들리는</strong><br />
          볼륨으로 조절해 주세요.
        </p>
      </div>

      <!-- 사운드 웨이브 -->
      <div style="display:flex; justify-content:center; margin-bottom:32px;">
        <div class="sound-wave sound-wave--paused" id="calibWave">
          <div class="sound-wave__bar"></div>
          <div class="sound-wave__bar"></div>
          <div class="sound-wave__bar"></div>
          <div class="sound-wave__bar"></div>
          <div class="sound-wave__bar"></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <span class="caption">볼륨</span>
          <span class="caption gold-text" id="volumeLabel">10%</span>
        </div>
        <input type="range" class="volume-slider" id="volumeSlider" min="1" max="100" value="10" />
        <div style="display:flex; justify-content:space-between; margin-top:8px;">
          <span class="caption">🔈 작게</span>
          <span class="caption">🔊 크게</span>
        </div>
      </div>

      <p class="caption" style="text-align:center; margin-bottom:24px;">
        💡 스피커·이어폰 모두 가능 / 조용한 환경 권장
      </p>

      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn--outline btn--full" id="btnPlay" onclick="toggleCalib()">
          🔊 소리 들어보기
        </button>
        <button class="btn btn--primary btn--full btn--lg" onclick="goToSweep()">
          🎵 테스트 시작하기
        </button>
      </div>

    </div>

    <!-- ================================
         SCREEN 1: 주파수 스윕
         ================================ -->
    <div class="screen" id="screen1">

      <div style="text-align:center; margin-bottom:32px;">
        <p class="caption" style="letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px;">Step 2 of 2</p>
        <h1 class="heading-1" style="margin-bottom:12px;">소리가 들리나요?</h1>
        <p class="body" style="color:var(--text-muted);">
          소리가 점점 높아져요.<br />
          <strong style="color:var(--text);">더 이상 들리지 않으면</strong> 버튼을 눌러주세요.
        </p>
      </div>

      <div class="freq-bar-wrap" style="margin-bottom:8px;" id="freqBars"></div>
      <div style="display:flex; justify-content:space-between; margin-bottom:8px; padding:0 2px;">
        <span class="caption">8,000 Hz</span>
        <span class="caption">20,000 Hz</span>
      </div>

      <!-- 현재 주파수 크게 표시 -->
      <div style="text-align:center; margin-bottom:24px; min-height:72px; display:flex; flex-direction:column; align-items:center; justify-content:center;" id="freqDisplay">
        <p class="caption" style="margin-bottom:4px;" id="freqDisplayLabel">측정 대기 중</p>
        <p style="font-size:2.5rem; font-weight:800; letter-spacing:-0.03em; color:var(--gold); line-height:1;" id="currentFreqLabel">—</p>
      </div>

      <div class="progress-track" style="margin-bottom:48px;">
        <div class="progress-fill" id="sweepProgress" style="width:0%"></div>
      </div>

      <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
        <!-- 시작 전: 시작하기 버튼 -->
        <button class="btn btn--primary btn--full btn--lg animate-pulse-gold" id="btnSweepStart" onclick="runSweep()">
          🎵 시작하기
        </button>
        <button class="btn btn--outline btn--full" id="btnRefTone" onclick="toggleRefTone()">
          🔊 기준음 듣기 (8,000 Hz)
        </button>

        <!-- 스윕 중: 못 들어요 버튼 (숨김) -->
        <div id="cantHearWrap" style="display:none; flex-direction:column; align-items:center; gap:20px;">
          <button class="btn-stop" onclick="cantHear()">
            <span style="font-size:2rem;">🔇</span>
            <span>못 들어요</span>
          </button>
          <p class="caption" style="text-align:center;">
            볼륨은 건드리지 말고<br />소리가 사라지면 눌러주세요
          </p>
        </div>
      </div>

    </div>

  </div>
</main>

<script src="../js/audio.js"></script>
<script src="../js/light.js"></script>
</body>
</html>
